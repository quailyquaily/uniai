# Example pricing catalog for uniai.
#
# Checked against official pricing pages on 2026-05-20.
# Moonshot Kimi entries refreshed on 2026-04-23 for Kimi K2.6 launch.
# OpenAI GPT-5.5 standard rates added on 2026-04-24 from the public pricing page.
# DeepSeek V4 entries refreshed on 2026-05-23 from the public pricing page.
# xAI Grok 4.3 and Grok 4.20 entries refreshed on 2026-05-13 from the official
# docs pages.
# OpenAI GPT Image 2 image-generation pricing added on 2026-05-13 from the
# public pricing page.
# OpenAI GPT Image 1 and Gemini image-generation preview pricing added on
# 2026-05-14 from the public pricing pages.
# Gemini 3.5 Flash pricing added on 2026-05-20 from the public pricing page.
# Prices may change later. Re-check the official pages before using this in production.
#
# This example includes chat token rates and image-generation token rates that
# fit the current PricingCatalog schema.
# It does not encode:
# - Batch / Flex / Priority variants
# - tool invocation fees
# - storage fees for cache/context caching
# - audio specific token prices
# - separate text-output token prices for image-generation models that can
#   return both text and images
#
# Official sources used for this file:
# - OpenAI: https://openai.com/api/pricing/
# - OpenAI GPT-5.5 availability note: https://help.openai.com/en/articles/11909943-gpt-53-and-gpt-54-in-chatgpt
# - Anthropic: https://docs.anthropic.com/en/docs/about-claude/pricing
# - Anthropic announcements: https://www.anthropic.com/news/claude-opus-4-7
# - Anthropic model IDs: https://platform.claude.com/docs/en/about-claude/models/overview
# - Gemini: https://ai.google.dev/gemini-api/docs/pricing
# - Mistral: https://mistral.ai/pricing
# - Mistral models: https://docs.mistral.ai/getting-started/models
# - Cohere: https://docs.cohere.com/docs/how-does-cohere-pricing-work
# - Z.AI: https://docs.z.ai/guides/overview/pricing
# - Moonshot Kimi: https://platform.kimi.ai/docs/pricing/chat
# - MiniMax: https://platform.minimax.io/docs/guides/pricing-paygo
# - DeepSeek: https://api-docs.deepseek.com/quick_start/pricing/
# - xAI: https://docs.x.ai/developers/models
# - xAI Grok 4.3 detail: https://docs.x.ai/developers/models/grok-4.3
# - Groq: https://console.groq.com/docs/models
# - Groq GPT-OSS cached pricing: https://console.groq.com/docs/model/openai/gpt-oss-120b
# - Cloudflare: https://developers.cloudflare.com/workers-ai/platform/pricing/
#
# Notes:
# - This example includes current GPT-5.5 / GPT-5 / GPT-5.2 / GPT-4o text pricing and keeps
#   the current `gpt-5.4*` entries, including long-context tiers where applicable.
# - OpenAI's public pricing page lists `gpt-5.5` standard rates, but OpenAI's help center says
#   `gpt-5.5` is not in the API yet as of 2026-04-24. The current API docs do not yet publish
#   model IDs or long-context surcharge details for `gpt-5.5`, so this file encodes only the
#   published standard token rates.
# - Anthropic cache prices below are derived from Anthropic's published prompt-caching multipliers:
#   cache read = 0.1x input, 5m cache write = 1.25x input, 1h cache write = 2x input.
# - OpenAI `gpt-5.4*` long-context tiers below use `>270000` input tokens.
# - Gemini `gemini-3-pro-preview` and `gemini-2.5-pro` long-context tiers below use
#   `>200000` input tokens.
# - xAI `grok-4.3` higher-context pricing below uses `>200000` input tokens.
# - Gemini Flash entries below use the text / image / video tier.
# - Runtime price lookup matches by `model` / `aliases` by default, not by the
#   client's driver/provider name. Callers can optionally pass an explicit
#   `inference_provider` hint. If that provider exists in the catalog, matching
#   stays within that provider. Otherwise lookup falls back to model-only matching.
# - Mistral entries below use explicit dated model IDs to avoid guessing where a
#   moving `*-latest` alias points, except where Mistral docs explicitly map the alias.
# - OpenAI `gpt-image-2` image generation pricing uses separate rates for text
#   input, image input, cached input, and image output tokens.
# - Gemini image-generation pricing below uses Standard tier token rates. The
#   current image pricing schema has one output rate, so Gemini image rules use
#   the published image-output token rate.

# Informational metadata for humans. ParsePricingYAML ignores unknown top-level
# fields, so this section does not affect runtime pricing lookup.
pricing_references:
  inference_providers:
    openai: "https://platform.openai.com/docs/pricing/"
    openai_gpt_image_1: "https://platform.openai.com/docs/models/gpt-image-1"
    anthropic: "https://platform.claude.com/docs/en/docs/about-claude/pricing"
    gemini: "https://ai.google.dev/gemini-api/docs/pricing"
    mistral: "https://mistral.ai/pricing"
    cohere: "https://docs.cohere.com/docs/how-does-cohere-pricing-work"
    zai: "https://docs.z.ai/guides/overview/pricing"
    moonshot: "https://platform.kimi.ai/docs/pricing/chat"
    minimax: "https://platform.minimax.io/docs/guides/pricing-paygo"
    deepseek: "https://api-docs.deepseek.com/quick_start/pricing/"
    xai: "https://docs.x.ai/developers/models"
    groq: "https://console.groq.com/docs/models"
    cloudflare: "https://developers.cloudflare.com/workers-ai/platform/pricing/"
    qwen: "https://help.aliyun.com/zh/model-studio/model-pricing"
    doubao: "https://www.volcengine.com/docs/82379/1544106"

image:
